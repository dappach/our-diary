<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Diary 📖</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    height: 100vh;
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* glow */
body::before {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(168,192,255,0.15), transparent 70%);
    filter: blur(100px);
}

/* card */
.card-box {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    width: 100%;
    max-width: 350px;
    text-align: center;
}

h1 { color: #eaeaea; }
.subtitle { color: #b0b0b0; font-size: 14px; }

.form-control {
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
}

.btn-custom {
    background: linear-gradient(135deg, #a8c0ff, #fbc2eb);
    border: none;
    color: #1a1a2e;
}
</style>
</head>

<body>

<div class="card-box">
    <h1>Our Diary 📖</h1>
    <p class="subtitle">Every moment with you… is my favorite page</p>

    <input type="password" id="pass" class="form-control mt-3" placeholder="Enter password">

    <button onclick="check()" class="btn btn-custom w-100 mt-3">Unlock</button>

    <p id="msg" class="text-danger mt-2"></p>

    <p style="font-size:12px; color:#aaa;">Only you know the password 💫</p>
</div>

<script>
function check() {
    let p = document.getElementById("pass").value;

    if(p === "ourlove") {
        window.location.href = "home.html";
    } else {
        document.getElementById("msg").innerText = "Wrong password";
    }
}
</script>

</body>
</html>
