<!DOCTYPE html>
<html>
<head>
<title>Our Diary 📖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    
    /* 🔥 Gradient background (NOT plain black) */
    background: radial-gradient(circle at top, #1a1a2e, #0f0f1a, #050505);
    
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* 🌌 subtle animated glow */
body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0, 170, 255, 0.15), transparent 70%);
    top: -100px;
    left: -100px;
    filter: blur(80px);
}

/* 💎 glass card */
.box {
    position: relative;
    background: rgba(255, 255, 255, 0.05);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    text-align: center;
    
    /* ✨ shadow + glow combo */
    box-shadow: 
        0 0 40px rgba(0, 0, 0, 0.8),
        0 0 60px rgba(0, 170, 255, 0.2),
        inset 0 0 20px rgba(255,255,255,0.05);
}

/* 🖤 heading */
h1 {
    margin: 0;
    font-size: 32px;
    letter-spacing: 1px;
    
    /* gradient text */
    background: linear-gradient(90deg, #ffffff, #8ec5ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* subtitle */
p {
    color: rgba(255,255,255,0.6);
}

/* ✍️ input */
input {
    width: 220px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 15px;
    
    background: rgba(255,255,255,0.08);
    color: white;
    outline: none;

    box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
}

/* 🔘 button */
button {
    margin-top: 15px;
    padding: 12px 25px;
    border-radius: 10px;
    border: none;
    cursor: pointer;

    background: linear-gradient(135deg, #0f3460, #1f6feb);
    color: white;

    transition: 0.3s;

    box-shadow: 0 0 15px rgba(31,111,235,0.5);
}

/* hover effect */
button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(31,111,235,0.9);
}

/* error text */
#msg {
    margin-top: 10px;
    color: #ff6b6b;
}
</style>
</head>

<body>

<div class="box">
    <h1>Our Diary 📖</h1>
    <p>A story only we understand...</p>

    <input type="password" id="pass" placeholder="Enter password">
    <br>
    <button onclick="check()">Unlock</button>

    <p id="msg"></p>
</div>

<script>
function check() {
    let p = document.getElementById("pass").value;

    if(p === "ourlove") {
        window.location.href = "home.html";
    } else {
        document.getElementById("msg").innerText = "Wrong password";
    }
}
</script>

</body>
</html>
