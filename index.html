<!DOCTYPE html>
<html>
<head>
    <title>Our World 💫</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .box {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        input {
            padding: 10px;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            background: white;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">
   <h1>Welcome to Our Diary 📖</h1>
<p>A story written by us... for us ❤️</p>
    <p>Enter password</p>

    <input type="password" id="pass">
    <br>
    <button onclick="check()">Enter</button>

    <p id="msg"></p>
</div>

<script>
function check() {
    let p = document.getElementById("pass").value;

    if(p === "ourlove") {
        window.location.href = "home.html";
    } else {
        document.getElementById("msg").innerText = "Wrong password 😢";
    }
}
</script>

</body>
</html>
