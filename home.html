<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Diary</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1d2238, #2a2f4f, #3b3355);
    color: #f4f4f4;
    overflow: hidden;
    position: relative;
}

/* 🌌 soft ambient glow */
body::before,
body::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    z-index: 0;
}

body::before {
    width: 280px;
    height: 280px;
    background: rgba(168,192,255,0.15);
    top: 5%;
    left: 8%;
}

body::after {
    width: 250px;
    height: 250px;
    background: rgba(251,194,235,0.12);
    bottom: 8%;
    right: 8%;
}

/* ✨ glitter particles */
.sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: rgba(255,255,255,0.8);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255,255,255,0.8);
    animation: floatUp 12s linear infinite;
}

@keyframes floatUp {
    from {
        transform: translateY(100vh);
        opacity: 0;
    }
    20% { opacity: 1; }
    to {
        transform: translateY(-20vh);
        opacity: 0;
    }
}

/* top navbar */
.navbar {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(18px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    z-index: 2;
}

.nav-link {
    color: #f4f4f4 !important;
    transition: 0.3s;
    text-shadow: 0 0 8px rgba(255,255,255,0.15);
}

.nav-link:hover {
    color: #d9e7ff !important;
    text-shadow: 0 0 15px rgba(168,192,255,0.45);
}

/* center section */
.main-content {
    position: relative;
    z-index: 2;
    height: 78vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.hero-box {
    background: rgba(255,255,255,0.05);
    padding: 35px;
    border-radius: 24px;
    backdrop-filter: blur(20px);
    box-shadow:
        0 12px 35px rgba(0,0,0,0.35),
        0 0 30px rgba(168,192,255,0.08),
        inset 0 0 12px rgba(255,255,255,0.03);
}

.hero-box h2 {
    text-shadow: 0 0 15px rgba(255,255,255,0.12);
}

.hero-box p {
    color: #d1d1d1;
}

/* footer */
footer {
    position: relative;
    z-index: 2;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    text-align: center;
    padding: 18px;
    color: #d6d6d6;
    box-shadow: 0 -8px 20px rgba(0,0,0,0.25);
    text-shadow: 0 0 10px rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<!-- ✨ glitter particles -->
<div class="sparkle" style="left:10%; animation-delay:0s;"></div>
<div class="sparkle" style="left:25%; animation-delay:2s;"></div>
<div class="sparkle" style="left:40%; animation-delay:4s;"></div>
<div class="sparkle" style="left:60%; animation-delay:1s;"></div>
<div class="sparkle" style="left:75%; animation-delay:3s;"></div>
<div class="sparkle" style="left:90%; animation-delay:5s;"></div>

<!-- top nav -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand text-light" href="#">Our Diary 📖</a>

    <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Our Story</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Memories</a></li>
        <li class="nav-item"><a class="nav-link" href="#">For You</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- center -->
<div class="main-content">
    <div class="hero-box">
        <h2>Welcome to Our Diary 💫</h2>
        <p>Every memory with you feels like a page worth keeping forever.</p>
    </div>
</div>

<!-- footer -->
<footer>
    I love you Mirakiii ❤️<br>
    Every page here glows because of you ✨
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
